voice:
  wake_word: atlas
  stt_provider: whisper
  tts_provider: piper

llm:
  provider: openai
  model: gpt-5.6-luna
  reasoning_effort: none
  verbosity: low
  max_output_tokens: 300
  timeout_seconds: 30
  max_retries: 1

assistant:
  personality: concise

integrations:
  weather: false
  calendar: false
  home_assistant: false

logging:
  level: INFO
  format: json
